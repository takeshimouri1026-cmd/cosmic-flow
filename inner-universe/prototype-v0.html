// ── 3D力学レイアウト：クラスタごとに集まりつつ、繋がりの強いものが引き合う ──
function computeLayout() {
  const centers = {
    cosmos:    new THREE.Vector3(0, 44, -26),
    modernity: new THREE.Vector3(-54, 0, 20),
    earth:     new THREE.Vector3(46, -28, 22),
    relation:  new THREE.Vector3(36, 16, -44),
    meta:      new THREE.Vector3(-22, -36, -36),
  };
  // 乱数（毎回同じ配置になるよう擬似乱数で固定）
  let seed = 42;
  const rand = () => (seed = (seed * 16807) % 2147483647) / 2147483647 - 0.5;

  GRAPH.nodes.forEach(n => {
    const c = centers[n.cluster] || new THREE.Vector3();
    n.pos = c.clone().add(new THREE.Vector3(rand()*30, rand()*30, rand()*30));
  });

  for (let iter = 0; iter < 260; iter++) {
    // 反発力
    for (let i = 0; i < GRAPH.nodes.length; i++) {
      for (let j = i + 1; j < GRAPH.nodes.length; j++) {
        const a = GRAPH.nodes[i], b = GRAPH.nodes[j];
        const d = a.pos.clone().sub(b.pos);
        const len2 = Math.max(d.lengthSq(), 4);
        const f = d.normalize().multiplyScalar(1400 / (len2 + 40));
        a.pos.add(f); b.pos.sub(f);
      }
    }
    // エッジのばね
    GRAPH.edges.forEach(e => {
      const a = nodesById[e.source], b = nodesById[e.target];
      const d = b.pos.clone().sub(a.pos);
      const len = d.length();
      const rest = 26;
      const f = d.normalize().multiplyScalar((len - rest) * 0.018 * e.strength);
      a.pos.add(f); b.pos.sub(f);
    });
    // クラスタ重心へゆるく引き寄せる
    GRAPH.nodes.forEach(n => {
      const c = centers[n.cluster];
      if (c) n.pos.add(c.clone().sub(n.pos).multiplyScalar(0.02));
    });
  }
  // 全体を原点中心へ
  const mean = new THREE.Vector3();
  GRAPH.nodes.forEach(n => mean.add(n.pos));
  mean.multiplyScalar(1 / GRAPH.nodes.length);
  GRAPH.nodes.forEach(n => n.pos.sub(mean));
}

});

});

// ── 発光テクスチャ ──
function glowTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0, 64,64,64);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.25, 'rgba(255,255,255,0.4)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const GLOW_TEX = glowTexture();

// ── ラベル（短い名前が星の上に浮かぶ） ──
function makeLabel(text, colorCss) {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const fontPx = 30;
  const font = `500 ${fontPx}px 'Hiragino Sans','Yu Gothic',sans-serif`;
  const c = document.createElement('canvas');
  let ctx = c.getContext('2d');
  ctx.font = font;
  const w = Math.ceil(ctx.measureText(text).width) + 28;
  const h = 46;
  c.width = w * dpr; c.height = h * dpr;
  ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.font = font;
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.9)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = colorCss;
  ctx.fillText(text, 14, h/2);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.85, depthWrite: false });
  const s = new THREE.Sprite(mat);
  const k = 0.075;
  s.scale.set(w * k, h * k, 1);
  return s;
}

function makeStars(count, rMin, rMax) {
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(rMin + Math.random()*(rMax-rMin));
    pos.set([v.x, v.y, v.z], i*3);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const m = new THREE.PointsMaterial({ color: 0x9fb0ff, size: 1.3, sizeAttenuation: true,
    transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending, depthWrite: false });
  return new THREE.Points(g, m);
}
scene.add(makeStars(700, 260, 620));

// 遠景の星雲（クラスタ色のにじみ）
Object.values(CLUSTERS).forEach((cl, i) => {
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: GLOW_TEX, color: new THREE.Color(cl.color),
    transparent: true, opacity: 0.07, blending: THREE.AdditiveBlending, depthWrite: false }));
  const a = i / Object.keys(CLUSTERS).length * Math.PI * 2;
  sp.position.set(Math.cos(a)*320, Math.sin(a*1.7)*160, Math.sin(a)*320);
  sp.scale.set(420, 420, 1);
  scene.add(sp);
});

// ── ノードとエッジの構築 ──
computeLayout();

const nodeMeshes = [];       // レイキャスト対象
const nodeVisuals = {};      // id → {mesh, glow, label}
const graphGroup = new THREE.Group();
scene.add(graphGroup);

GRAPH.nodes.forEach(n => {
  const color = new THREE.Color(CLUSTERS[n.cluster].color);
  const radius = 1.5 + n.size * 0.32;

  // 星の核
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 24, 24),
    new THREE.MeshBasicMaterial({ color: color.clone().lerp(new THREE.Color('#ffffff'), 0.35),
      transparent: true, opacity: 1 })
  );
  mesh.position.copy(n.pos);
  mesh.userData.node = n;

  // 星のまわりの光
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: GLOW_TEX, color, transparent: true, opacity: 0.55,
    blending: THREE.AdditiveBlending, depthWrite: false }));
  glow.position.copy(n.pos);
  const gs = radius * 5.2;
  glow.scale.set(gs, gs, 1);
  glow.userData.baseScale = gs;
  glow.userData.phase = Math.random() * Math.PI * 2;

  // ラベル
  const label = makeLabel(n.short || n.label, '#ded7f2');
  label.position.copy(n.pos).add(new THREE.Vector3(0, radius + 2.4, 0));

  graphGroup.add(mesh, glow, label);
  nodeMeshes.push(mesh);
  nodeVisuals[n.id] = { mesh, glow, label, radius };
});

// エッジ：発光する光の筋
const edgeVisuals = [];
GRAPH.edges.forEach(e => {
  const a = nodesById[e.source], b = nodesById[e.target];
  const ca = new THREE.Color(CLUSTERS[a.cluster].color);
  const cb = new THREE.Color(CLUSTERS[b.cluster].color);
  const color = e.kind === 'resonance' ? new THREE.Color('#e8e4ff') : ca.clone().lerp(cb, 0.5);
  const baseOpacity = e.kind === 'resonance' ? 0.10 + e.strength * 0.12 : 0.10 + e.strength * 0.26;

  const geo = new THREE.BufferGeometry().setFromPoints([a.pos, b.pos]);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: baseOpacity,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const line = new THREE.Line(geo, mat);
  graphGroup.add(line);

  // 影響エッジには、源→先へ流れる光の粒を走らせる
  let particle = null;
  if (e.kind === 'influence') {
    particle = new THREE.Sprite(new THREE.SpriteMaterial({
      map: GLOW_TEX, color, transparent: true, opacity: 0.8,
      blending: THREE.AdditiveBlending, depthWrite: false }));
    particle.scale.set(2.2, 2.2, 1);
    graphGroup.add(particle);
  }
  edgeVisuals.push({ e, a, b, line, particle, baseOpacity,
    offset: Math.random(), speed: 0.05 + e.strength * 0.09 });
});

// ── 凡例 ──
const legend = document.getElementById('legend');
Object.values(CLUSTERS).forEach(cl => {
  const s = document.createElement('span');
  s.innerHTML = `<i style="background:${cl.color};color:${cl.color}"></i>${cl.label}`;
  legend.appendChild(s);
});

// ── ホバー / タップで情報カード ──
const card = document.getElementById('card');
const cardType = document.getElementById('card-type');
const cardCluster = document.getElementById('card-cluster');
const cardTitle = document.getElementById('card-title');
const cardDesc = document.getElementById('card-desc');

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hovered = null;
let selected = null;

function pick(clientX, clientY) {
  pointer.x = (clientX / innerWidth) * 2 - 1;
  pointer.y = -(clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(nodeMeshes);
  return hits.length ? hits[0].object.userData.node : null;
}

function showCard(n) {
  cardType.textContent = TYPE_LABEL[n.type] || n.type;
  cardCluster.textContent = CLUSTERS[n.cluster].label;
  cardCluster.style.borderColor = CLUSTERS[n.cluster].color;
  cardCluster.style.color = CLUSTERS[n.cluster].color;
  cardTitle.textContent = n.label;
  cardDesc.textContent = n.description;
  card.classList.add('show');
}
function hideCard() { card.classList.remove('show'); }

// 選択時：つながる星と光の筋を強調し、他は淡く沈める
function applyFocus(n) {
  const connected = new Set();
  if (n) {
    connected.add(n.id);
    GRAPH.edges.forEach(e => {
      if (e.source === n.id) connected.add(e.target);
      if (e.target === n.id) connected.add(e.source);
    });
  }
  GRAPH.nodes.forEach(node => {
    const v = nodeVisuals[node.id];
    const on = !n || connected.has(node.id);
    v.mesh.material.opacity = on ? 1 : 0.18;
    v.glow.material.opacity = on ? 0.55 : 0.10;
    v.label.material.opacity = on ? 0.85 : 0.12;
    const k = (n && node.id === n.id) ? 1.35 : 1;
    v.mesh.scale.setScalar(k);
  });
  edgeVisuals.forEach(ev => {
    const touches = n && (ev.e.source === n.id || ev.e.target === n.id);
    ev.line.material.opacity = !n ? ev.baseOpacity : (touches ? Math.min(ev.baseOpacity * 2.6, 0.9) : ev.baseOpacity * 0.12);
    if (ev.particle) ev.particle.material.opacity = !n ? 0.8 : (touches ? 1 : 0.06);
  });
}

// タップとドラッグの判別
let downX = 0, downY = 0;
renderer.domElement.addEventListener('pointerdown', ev => { downX = ev.clientX; downY = ev.clientY; });
renderer.domElement.addEventListener('pointerup', ev => {
  const moved = Math.hypot(ev.clientX - downX, ev.clientY - downY);
  if (moved > 8) return; // ドラッグは無視
  const n = pick(ev.clientX, ev.clientY);
  if (n) {
    selected = (selected && selected.id === n.id) ? null : n;
    if (selected) showCard(selected); else hideCard();
  } else {
    selected = null; hideCard();
  }
  applyFocus(selected);
});

// PCのホバー（選択が無いときだけカードを出す）
renderer.domElement.addEventListener('pointermove', ev => {
  if (ev.pointerType === 'touch') return;
  const n = pick(ev.clientX, ev.clientY);
  renderer.domElement.style.cursor = n ? 'pointer' : 'grab';
  if (n !== hovered) {
    hovered = n;
    if (!selected) {
      if (n) showCard(n); else hideCard();
    }
  }
});

// ── アニメーションループ ──
const clock = new THREE.Clock();
const tmpV = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // 星の呼吸（光がゆっくり脈打つ）
  GRAPH.nodes.forEach(node => {
    const v = nodeVisuals[node.id];
    const s = v.glow.userData.baseScale * (1 + 0.07 * Math.sin(t * 1.4 + v.glow.userData.phase));
    v.glow.scale.set(s, s, 1);
  });

  // 光の粒が影響の向きに流れる
  edgeVisuals.forEach(ev => {
    if (!ev.particle) return;
    const p = (t * ev.speed + ev.offset) % 1;
    tmpV.lerpVectors(ev.a.pos, ev.b.pos, p);
    ev.particle.position.copy(tmpV);
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
